<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Julia Set (modular)</title>
  <style>
    body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#111;color:#ddd;font-family:system-ui}
    #wrap{position:relative}
    canvas{display:block;border:1px solid #222;background:#000}
    .controls{position:absolute;left:8px;top:8px;padding:8px;background:rgba(0,0,0,0.45);border-radius:6px;display:flex;gap:10px;align-items:center;font-size:13px}
    input[type="range"]{width:160px}
    input[type="number"]{width:86px}
    button{padding:6px 8px;border-radius:6px}
    .hint{position:absolute;right:8px;top:8px;font-size:12px;color:#aaa}
  </style>
</head>
<body>
  <div id="wrap">
    <div class="controls" id="controls">
      <div>
        cx: <input id="cxRange" type="range" min="-1.5" max="1.5" step="0.001" value="-0.8"><br>
        cy: <input id="cyRange" type="range" min="-1.5" max="1.5" step="0.001" value="0.156">
      </div>
      <div>
        cx: <input id="cxNum" type="number" step="0.001" value="-0.8"><br>
        cy: <input id="cyNum" type="number" step="0.001" value="0.156">
      </div>
      <div>
        Iter: <input id="iterNum" type="number" step="10" value="300" min="50" max="5000"><br>
        <button id="reset">Reset</button>
      </div>
    </div>

    <canvas id="c" width="800" height="800"></canvas>
    <div class="hint">Click canvas to set c. Wheel to zoom.</div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
